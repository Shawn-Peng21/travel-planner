<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Travel Planner</title>
    <style>
        #container {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <!-- 高德地图 JS SDK -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=a03a3265411ecfa26f0ce1a02ed64173"></script>

    <script>
        // 初始化地图
        var map = new AMap.Map('container', {
            zoom: 12,
            center: [116.397428, 39.90923] // 默认北京
        });

        // 添加一个标记（天安门）
        var marker = new AMap.Marker({
            position: [116.397428, 39.90923],
            title: "测试景点"
        });

        map.add(marker);
    </script>
</body>
</html>
